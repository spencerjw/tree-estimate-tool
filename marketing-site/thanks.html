<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thanks! — TreeSnap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; background: #f0fdf4; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 24px; }
    .card { background: #fff; border-radius: 16px; padding: 48px 40px; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 28px; font-weight: 800; color: #111; margin-bottom: 12px; }
    p { color: #6b7280; font-size: 16px; line-height: 1.6; margin-bottom: 32px; }
    a { display: inline-block; background: #2d6a2d; color: #fff; padding: 12px 28px; border-radius: 8px; font-weight: 600; text-decoration: none; }
    a:hover { background: #235223; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>You're on the list!</h1>
    <p>Thanks for reaching out. We'll have your TreeSnap estimate tool set up and ready within 24 hours. Check your inbox — we'll be in touch soon.</p>
    <a href="https://demo.treesnap.cloud">Try the Live Demo →</a>
  </div>
</body>
</html>
