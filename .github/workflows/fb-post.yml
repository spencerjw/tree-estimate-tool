name: FB Poster

on:
  schedule:
    - cron: '0 15 * * 2'   # Tue 10:00 CDT (15:00 UTC)
    - cron: '0 23 * * 4'   # Thu 18:00 CDT (23:00 UTC)
    - cron: '0 14 * * 6'   # Sat 09:00 CDT (14:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fb-poster
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install requests

      - name: Post to Facebook
        run: python bots/fb_poster/scripts/fb_post.py
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}

      - name: Commit queue + log updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bots/fb_poster/config/fb_post_queue.json bots/fb_poster/state/fb_post_log.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "bot(fb): post (auto-update queue + log)"
            git push
          fi
